services:
  - type: web
    name: lucky-cake-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: GITHUB_MODELS_ENDPOINT
        value: https://models.inference.ai.azure.com
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: DATA_DIR
        value: data
      - key: MAX_HISTORY_MESSAGES
        value: "20"
